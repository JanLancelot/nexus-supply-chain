# ===================================================================
# Test Profile — H2 in-memory, no Liquibase, Kafka/Redis fallback
# ===================================================================

spring.application.name=demo

# H2 in-memory database for tests
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=false
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Let Hibernate create the schema automatically for tests
spring.jpa.hibernate.ddl-auto=create-drop

# Disable Liquibase in tests (Hibernate DDL handles schema)
spring.liquibase.enabled=false

# Kafka points to unreachable host — SpringKafkaLiteBroker will
# gracefully fall back to RedisKafkaLiteBroker -> in-memory queues
spring.kafka.bootstrap-servers=localhost:19092

# Redis points to unreachable host — RedisKafkaLiteBroker will
# gracefully fall back to in-memory event queues
spring.data.redis.host=localhost
spring.data.redis.port=16379
spring.data.redis.connect-timeout=1s
spring.data.redis.timeout=1s

# JWT configuration
jwt.secret=9a67a86968d9fe15e8d197607a3c306716766d3a95d1222877a165b4c10757a3
jwt.expiration=3600000

# Suppress noisy logs during tests
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.orm.jdbc.bind=WARN
