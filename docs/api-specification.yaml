openapi: 3.0.3
info:
  title: Enterprise Supply Chain Visibility & Operations API
  description: Internal P&G IT simulated operations API managing secure inventory lifecycles, deterministic purchase orders, and forensic auditing traces.
  version: 1.0.0
servers:
  - url: http://localhost:8080/api/v1
    description: Local Development Environment

paths:
  /auth/login:
    post:
      summary: Authenticate User Identity
      description: Validates corporate credentials and returns a stateless cryptographically signed JWT bearer token.
      operationId: loginUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                  example: operator@pg.com
                password:
                  type: string
                  format: password
                  example: SecurePassword123
      responses:
        '200':
          description: Authentication Successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                    description: JWT bearer access token valid for 60 minutes.
                    example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        '400':
          $ref: '#/components/responses/400BadRequest'
        '401':
          description: Invalid Credentials Supplied.

  /inventory/products:
    get:
      summary: Retrieve Inventory Catalog List
      description: Returns a collection of tracking assets. Accessible by ROLE_STAFF and ROLE_ADMIN.
      security:
        - BearerAuth: []
      responses:
        '200':
          description: A list of current inventory records.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Product'
        '401':
          $ref: '#/components/responses/401Unauthorized'

    post:
      summary: Create New Product Catalog Definition
      description: Establishes a brand new material catalog node. Protected by ROLE_ADMIN.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - sku
                - name
                - reorderLevel
              properties:
                sku:
                  type: string
                  example: PG-FABSOFT-009
                name:
                  type: string
                  example: Downy Fresh Blossom 1L
                reorderLevel:
                  type: integer
                  minimum: 0
                  example: 50
      responses:
        '201':
          description: Product Successfully Extracted & Cataloged.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        '400':
          $ref: '#/components/responses/400BadRequest'
        '403':
          $ref: '#/components/responses/403Forbidden'

  /inventory/products/{id}/adjust:
    post:
      summary: Manually Adjust Inventory Balances
      description: Forces modifications to historical balance nodes. Requires an explicitly mapped system reason code. Protected by ROLE_ADMIN.
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - quantityAdjustment
                - reasonCode
              properties:
                quantityAdjustment:
                  type: integer
                  description: Negative values reflect scrap or damage; positive values reflect cyclical additions.
                  example: -12
                reasonCode:
                  type: string
                  enum: [CYCLIC_COUNT_DISCREPANCY, DAMAGED_GOODS_SCRAP, SUPPLIER_SHORTAGE]
                  example: DAMAGED_GOODS_SCRAP
      responses:
        '200':
          description: Stock mutation processed successfully and audit trace preserved.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        '400':
          $ref: '#/components/responses/400BadRequest'
        '403':
          $ref: '#/components/responses/403Forbidden'

  /orders:
    post:
      summary: Create a Purchase Order Execution Document
      description: Establishes a brand-new procurement run initialized directly into a DRAFT status footprint. Accessible by ROLE_STAFF and ROLE_ADMIN.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - supplierName
                - items
              properties:
                supplierName:
                  type: string
                  example: Global Chemical Logistics Corp
                items:
                  type: array
                  items:
                    type: object
                    required:
                      - productId
                      - quantity
                    properties:
                      productId:
                        type: string
                        format: uuid
                        example: 9b1deb4d-3b7d-4bad-9bdd-2b0d7b3dcb6d
                      quantity:
                        type: integer
                        minimum: 1
                        example: 500
      responses:
        '201':
          description: Purchase order draft cataloged successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        '400':
          $ref: '#/components/responses/400BadRequest'

  /orders/{id}/status:
    put:
      summary: Mutate Purchase Order Lifecycle Token State
      description: Drives the deterministic state engine. State transitions matching APPROVED, SHIPPED, and DELIVERED states are exclusively restricted to ROLE_ADMIN accounts.
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - status
              properties:
                status:
                  type: string
                  enum: [PENDING_APPROVAL, APPROVED, SHIPPED, DELIVERED, CANCELLED]
                  example: PENDING_APPROVAL
      responses:
        '200':
          description: Lifecycle transition verified and advanced successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        '400':
          description: Invalid state logic movement sequence rejected.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIError'
        '403':
          $ref: '#/components/responses/403Forbidden'

  /audit-logs:
    get:
      summary: Extract Immutable Forensic Audit History Records
      description: Streams historical system interaction metadata trails. Read operations exclusively accessible by ROLE_ADMIN credentials. Path strictly blocks destructive capabilities.
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Collection of recorded audit entries fetched successfully.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AuditLog'
        '403':
          $ref: '#/components/responses/403Forbidden'

  /notifications:
    get:
      summary: Retrieve Notifications List
      description: Returns a collection of notifications for the currently logged in user. Accessible by ROLE_STAFF and ROLE_ADMIN.
      security:
        - BearerAuth: []
      responses:
        '200':
          description: A list of notifications.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Notification'
        '401':
          $ref: '#/components/responses/401Unauthorized'

  /notifications/{id}/read:
    put:
      summary: Mark Notification as Read
      description: Updates the specific notification as read. Accessible by ROLE_STAFF and ROLE_ADMIN.
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Notification marked as read successfully.
        '401':
          $ref: '#/components/responses/401Unauthorized'
        '403':
          $ref: '#/components/responses/403Forbidden'

  /notifications/read-all:
    put:
      summary: Mark All Notifications as Read
      description: Marks all notifications of the currently logged in user as read. Accessible by ROLE_STAFF and ROLE_ADMIN.
      security:
        - BearerAuth: []
      responses:
        '200':
          description: All user notifications marked as read.
        '401':
          $ref: '#/components/responses/401Unauthorized'

  /analytics/dashboard:
    get:
      summary: Retrieve Supply Chain Analytics Dashboard
      description: Returns aggregate performance and tracking metrics. Restricted to ROLE_ADMIN.
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Dashboard metrics compiled successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnalyticsDashboard'
        '401':
          $ref: '#/components/responses/401Unauthorized'
        '403':
          $ref: '#/components/responses/403Forbidden'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Product:
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: c3b0a7e3-53d7-466d-a7a5-c6bf2d2c12cd
        sku:
          type: string
          example: PG-TIDE-001
        name:
          type: string
          example: Tide Liquid Original 1.47L
        stockQuantity:
          type: integer
          example: 1240
        reorderLevel:
          type: integer
          example: 200
        lowStockIndicator:
          type: boolean
          example: false

    Order:
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: f81d4fae-7dec-11d0-a765-00a0c91e6bf6
        supplierName:
          type: string
          example: Global Chemical Logistics Corp
        status:
          type: string
          example: PENDING_APPROVAL
        createdBy:
          type: string
          format: uuid
          example: d3b07384-d113-4c32-a52d-9c123456789a
        items:
          type: array
          items:
            $ref: '#/components/schemas/OrderItem'

    OrderItem:
      type: object
      properties:
        productId:
          type: string
          format: uuid
          example: c3b0a7e3-53d7-466d-a7a5-c6bf2d2c12cd
        quantity:
          type: integer
          example: 500

    AuditLog:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 14502
        entityName:
          type: string
          example: Product
        entityId:
          type: string
          format: uuid
          example: c3b0a7e3-53d7-466d-a7a5-c6bf2d2c12cd
        action:
          type: string
          example: ACTION_MANUAL_ADJUSTMENT
        oldValue:
          type: string
          example: '{"stockQuantity": 1252}'
        newValue:
          type: string
          example: '{"stockQuantity": 1240}'
        actorId:
          type: string
          format: uuid
          example: d3b07384-d113-4c32-a52d-9c123456789a
        timestamp:
          type: string
          format: date-time
          example: '2026-06-12T16:21:15Z'

    Notification:
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: d3b07384-d113-4c32-a52d-9c123456789a
        userId:
          type: string
          format: uuid
          example: c3b0a7e3-53d7-466d-a7a5-c6bf2d2c12cd
        type:
          type: string
          example: LOW_STOCK
        message:
          type: string
          example: 'Product PG-TIDE-001 is low in stock: 5 left (reorder level: 10)'
        isRead:
          type: boolean
          example: false
        createdAt:
          type: string
          format: date-time
          example: '2026-06-12T16:21:15Z'

    AnalyticsDashboard:
      type: object
      properties:
        totalRevenue:
          type: number
          example: 12500.50
        orderStatusCounts:
          type: object
          additionalProperties:
            type: integer
          example: { "DRAFT": 2, "PENDING_APPROVAL": 5 }
        lowStockCount:
          type: integer
          example: 3
        totalInventoryValue:
          type: number
          example: 450000.00
        warehouseStockCounts:
          type: object
          additionalProperties:
            type: integer
          example: { "Main Warehouse": 1200 }
        topProducts:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
                example: Tide Liquid Original
              totalQuantityOrdered:
                type: integer
                example: 1500

    APIError:
      type: object
      properties:
        status:
          type: integer
          example: 400
        error:
          type: string
          example: Bad Request
        message:
          type: string
          example: State machine validation error. Cannot advance DRAFT orders directly to SHIPPED status.
        timestamp:
          type: string
          format: date-time
          example: '2026-06-12T16:21:15Z'

  responses:
    400BadRequest:
      description: Structural runtime request body error or field constraint assertion violation.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/APIError'
    401Unauthorized:
      description: Request context missing appropriate cryptographic JWT bearer headers.
    403Forbidden:
      description: Identity token parsing succeeded, but user context lacks the required scope authorization level.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/APIError'